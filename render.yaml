services:
  # Backend service
  - type: web
    name: helpboard-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: helpboard-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: helpboard-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: helpboard-db
          property: password
      - key: DATABASE_HOST
        fromDatabase:
          name: helpboard-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: helpboard-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: helpboard-db
          property: database
      - key: JWT_SECRET
        value: ${JWT_SECRET}
      - key: JWT_EXPIRATIONMS
        value: "3600000"
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SERVER_PORT
        value: "8080"
      - key: SPRING_CORS_ALLOWED_ORIGINS
        value: ${FRONTEND_URL}

  # Frontend service
  - type: web
    name: helpboard-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd helpboard-frontend && npm ci && npm run build
    startCommand: cd helpboard-frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: ${BACKEND_URL}

# PostgreSQL Database (Render free tier supports PostgreSQL, NOT MySQL)
databases:
  - name: helpboard-db
    databaseName: helpboarddb
    user: helpboard_user
    plan: free
    region: oregon
