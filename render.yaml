services:
  # Backend service
  - type: web
    name: helpboard-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        value: "5432"
      - key: DATABASE_NAME
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        value: ${JWT_SECRET}
      - key: JWT_EXPIRATIONMS
        value: "3600000"
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SERVER_PORT
        value: "8080"
      - key: SPRING_CORS_ALLOWED_ORIGINS
        value: ${FRONTEND_URL}

  # Frontend service
  - type: web
    name: helpboard-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd helpboard-frontend && npm ci && npm run build
    startCommand: cd helpboard-frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: ${BACKEND_URL}
